# /etc/aide.conf - Fedora 44 / Surface Pro 9 (AIDE 0.19.2 Uyumlu)
# Bu konfigürasyon AIDE 0.19.2 sürümü için optimize edilmiştir.

# ============================================
# VERİTABANI KONUMLARI (ESKİ SÖZDİZİMİ)
# ============================================
@@define DBDIR /var/lib/aide
@@define LOGDIR /var/log/aide

# AIDE 0.19.2'de 'database' değil 'database_in' ve 'database_out' kullanılır
database_in=file:@@{DBDIR}/aide.db.gz
database_out=file:@@{DBDIR}/aide.db.new.gz
gzip_dbout=yes

# ============================================
# RAPORLAMA AYARLARI
# ============================================
log_level=warning
report_level=changed_attributes
report_format=plain
report_grouped=yes
database_attrs=H
database_add_metadata=yes
config_check_warn_unrestricted_rules=false

# ============================================
# GRUP TANIMLAMALARI (Makrolar)
# ============================================

# KRİTİK SİSTEM DOSYALARI
# p:izinler, i:inode, n:link sayısı, u:kullanıcı, g:grup
# s:boyut, b:blok sayısı, m:mtime, c:ctime
# Hash'ler: sha256 + sha512 (en güvenli ve yeterli)
SysCritical = p+i+n+u+g+s+b+m+c+sha256+sha512

# BİNARY VE KÜTÜPHANE
BinLib = p+i+n+u+g+s+m+c+sha256

# KONFİGÜRASYON
Config = p+i+n+u+g+sha256

# BOOT
Boot = p+i+n+u+g+s+b+m+c+sha256

# LOG (sadece temel)
Logs = p+i+n+u+g+s+m+c

# ============================================
# İZLENECEK DİZİNLER
# ============================================

# ---- KRİTİK SİSTEM DOSYALARI ----
/bin            SysCritical
/sbin           SysCritical
/usr/bin        SysCritical
/usr/sbin       SysCritical
/usr/local/bin  SysCritical
/usr/local/sbin SysCritical

# ---- KÜTÜPHANELER ----
/lib            BinLib
/lib64          BinLib
/usr/lib        BinLib
/usr/lib64      BinLib
/usr/local/lib  BinLib
/usr/local/lib64 BinLib

# ---- KONFİGÜRASYON ----
/etc            Config
/boot           Boot

# ---- SYSTEMD ----
/etc/systemd    Config
/usr/lib/systemd Config

# ---- GRUB ----
/boot/grub2     Boot
/boot/efi       Boot

# ---- DİĞER KRİTİK ALANLAR ----
/root           Config
/opt            Config
/srv            Config

# ---- YAZILIM YÖNETİMİ ----
/etc/dnf        Config
/etc/yum.repos.d Config
/var/lib/rpm    BinLib
/var/lib/dnf    BinLib

# ---- GÜVENLİK ----
/etc/ssh        Config
/etc/pki        Config
/etc/audit      Config
/etc/selinux    Config
/usr/lib/security Config

# ---- AĞ ----
/etc/hosts      Config
/etc/hostname   Config
/etc/resolv.conf Config
/etc/sysconfig/network-scripts Config

# ---- FİREWALL ----
/etc/firewalld  Config

# ---- SİSTEM DOSYALARI ----
/etc/fstab      Config
/etc/mtab       Config
/etc/crypttab   Config

# ---- SURFACE PRO 9 ÖZEL ----
/etc/modprobe.d Config
/etc/udev/rules.d Config
/etc/firmware   Config
/lib/firmware   Config

# ---- TPM VE GÜVENLİK ----
/etc/tpm2       Config
/etc/ima        Config

# ============================================
# HARIÇ TUTULACAK ALANLAR
# ============================================

# ---- GEÇİCİ VE SIK DEĞİŞEN ----
!/var/log/.*
!/var/tmp/.*
!/tmp/.*
!/var/spool/.*
!/var/cache/.*
!/var/lib/docker/.*
!/var/lib/libvirt/.*
!/var/lib/flatpak/.*
!/var/lib/containers/.*

# ---- KULLANICI ALANLARI ----
!/home/.*
!/root/.cache/.*
!/root/.local/.*
!/root/.config/.*
!/root/.gnupg/.*

# ---- BAĞLAMA NOKTALARI ----
!/mnt/.*
!/media/.*
!/run/.*
!/proc/.*
!/sys/.*
!/dev/.*

# ---- AIDE KENDİ VERİTABANI ----
!/var/lib/aide/aide.db.*
!/var/lib/aide/aide.db.new.*

# ---- SURFACE PRO 9 DRIVER'LARI ----
!/usr/lib/modules/.*/kernel/drivers/platform/surface/.*
!/usr/lib/firmware/surface/.*

# ---- PAKET YÖNETİCİSİ GEÇİCİLER ----
!/var/lib/rpm/.*\.old
!/var/lib/rpm/.*\.new
!/var/lib/rpm/__db\..*
!/var/lib/dnf/.*\.old
!/var/lib/dnf/.*\.new

# ---- SYSTEMD GEÇİCİLER ----
!/run/systemd/.*
!/var/lib/systemd/.*
!/var/log/journal/.*

# ---- GNOME GEÇİCİLER ----
!/etc/gdm/.*\.conf\..*
!/etc/NetworkManager/.*\.conf\..*
